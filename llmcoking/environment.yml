name: deepcoke
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
    # === 文本后端 ===
    # Web 框架
    - fastapi>=0.103
    - uvicorn[standard]>=0.24
    - python-multipart>=0.0.20

    # 数据库
    - SQLAlchemy>=2.0
    - PyMySQL>=1.0

    # LLM 调用（Ollama 原生 API）
    - requests>=2.31

    # 配煤 Agent - ML 模型
    - scikit-learn>=1.5
    - scipy>=1.10
    - numpy>=1.24
    - joblib>=1.3

    # RAG 向量检索
    - chromadb>=0.5.5
    - sentence-transformers>=3.0

    # PDF 解析
    - PyMuPDF>=1.24
    - pdfplumber>=0.11

    # 知识图谱（可选）
    - neo4j>=5.0

    # 工具
    - pydantic>=2.0
    - python-dotenv>=1.0

    # === 语音后端 ===
    - httpx>=0.27
    - soundfile>=0.12
    - torch>=2.0
    - websockets>=16.0
    - opencc-python-reimplemented>=0.1.7
